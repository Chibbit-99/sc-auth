<!doctype html>
<html>
<head>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body>

  <h3>Test Email Sender</h3>

  <div class="cf-turnstile"
       data-sitekey="0x4AAAAAADk-7U08EFjQBh3O"
       data-callback="onTurnstileSuccess">
  </div>

  <script>
    let latestToken = null;

    function onTurnstileSuccess(token) {
      latestToken = token;
      console.log("Turnstile ready");
    }

    async function sendEmail() {
      if (!latestToken) {
        alert("Turnstile not ready yet. Wait a second and try again.");
        return;
      }

      const email = "nathan.liu7@education.nsw.gov.au";

      const url =
        "https://gmail-test.chibbit.deno.net/?email=" +
        encodeURIComponent(email) +
        "&token=" +
        encodeURIComponent(latestToken);

      const res = await fetch(url);

      const text = await res.text(); // safer than json for debugging

      console.log("Response:", text);

      try {
        alert(JSON.stringify(JSON.parse(text), null, 2));
      } catch {
        alert(text);
      }
    }
  </script>

  <button onclick="sendEmail()">Send Email</button>

</body>
</html>
