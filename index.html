<!doctype html>
<html>
<head>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body>

  <h3>Test Email Sender</h3>

  <!-- Turnstile widget -->
  <div class="cf-turnstile" data-sitekey="YOUR_SITE_KEY"></div>

  <button onclick="sendEmail()">Send Email</button>

  <script>
    async function sendEmail() {
      // Get Turnstile token generated by browser
      const token =
        document.querySelector('[name="cf-turnstile-response"]').value;

      const email = "nathan.liu7@education.nsw.gov.au";

      const url = `https://gmail-test.chibbit.deno.net/?email=${encodeURIComponent(email)}&token=${encodeURIComponent(token)}`;

      const res = await fetch(url);
      const data = await res.json();

      console.log("Response:", data);
      alert(JSON.stringify(data, null, 2));
    }
  </script>

</body>
</html>
